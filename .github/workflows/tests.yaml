name: Tests

on: [ push, pull_request ]

# Tests ensures the project builds and executes unittest.
# The entry points are rather minimal.
jobs:
  ddhx:
    strategy:
      matrix:
        include: # easier to maintain, more explicit
          # DMD: Currently x86-only
          # GDC: Works best on Linux, BSDs
          # NOTE: setup-dlang grabs gdc from repo, dmd/ldc always latest
          # Windows
          - { os: windows-2022, dc: dmd }
          - { os: windows-2022, dc: ldc }
          - { os: windows-2025, dc: dmd }
          - { os: windows-2025, dc: ldc }
          - { os: windows-11-arm, dc: ldc }
          # macOS
          - { os: macos-14, dc: ldc }
          - { os: macos-15, dc: ldc }
          - { os: macos-26, dc: ldc }
          - { os: macos-15-intel, dc: ldc }
          - { os: macos-26-intel, dc: ldc }
          # Linux
          - { os: ubuntu-22.04, dc: gdc }
          - { os: ubuntu-24.04, dc: dmd }
          - { os: ubuntu-24.04, dc: gdc }
          - { os: ubuntu-24.04, dc: ldc }
          - { os: ubuntu-24.04-arm, dc: gdc }
          - { os: ubuntu-24.04-arm, dc: ldc }
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Setup D compiler
      uses: dlang-community/setup-dlang@v2
      with:
        compiler: ${{ matrix.dc }}
    # Ensure basic functionality
    - name: Unit tests
      run: dub test
    # Compiles and run
    - name: Compile & run
      run: dub -- --ver
    # Upload artifact
    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: ddhx-${{ matrix.os }}-${{ matrix.dc }}
        # Includes executable, manpage, test exec, PDBs
        path: ddhx*
